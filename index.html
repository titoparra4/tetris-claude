<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="header-row">
      <h1 class="game-title">TETRIS</h1>
      <label class="theme-switch" title="Alternar modo claro/oscuro">
        <input type="checkbox" id="theme-toggle" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div class="records-panel">
      <div class="records-block">
        <span class="label">TOP 5 RÉCORDS</span>
        <ol id="sidebar-highscore-list" class="highscore-list"></ol>
        <button id="reset-scores-btn" class="reset-btn">Resetear records</button>
      </div>
      <div class="records-block stats-block">
        <span class="label">ESTADÍSTICAS</span>
        <div class="stats-row">
          <span>Mejor combo: <strong id="sidebar-best-combo">0</strong></span>
          <span>Máx. líneas: <strong id="sidebar-max-lines">0</strong></span>
        </div>
      </div>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="overlay-highscores" class="hidden">
          <div id="highscore-entry" class="highscore-entry hidden">
            <p class="highscore-entry-label">¡Nuevo récord! Introduce tu nombre:</p>
            <div class="highscore-entry-row">
              <input type="text" id="name-input" maxlength="12" placeholder="Nombre" autocomplete="off" />
              <button id="save-score-btn">Guardar</button>
            </div>
          </div>

          <div class="highscore-table">
            <span class="label">TOP 5</span>
            <ol id="overlay-highscore-list" class="highscore-list"></ol>
          </div>

          <div class="stats-row">
            <span>Mejor combo: <strong id="overlay-best-combo">0</strong></span>
            <span>Máx. líneas: <strong id="overlay-max-lines">0</strong></span>
          </div>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
